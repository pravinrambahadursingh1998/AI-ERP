<div>
  <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Roles & Permissions</h1>
      <p class="text-slate-500 text-sm mt-1">Configure role-based access control</p>
    </div>
    <button class="px-4 py-2 bg-brand-600 text-white text-sm font-semibold rounded-lg hover:bg-brand-700">Create Role</button>
  </div>

  <div class="row grid grid-cols-1 md:grid-cols-3 gap-4">
    @for (role of roles(); track role.id) {
      <div class="card bg-white rounded-xl border border-slate-200 p-6">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-3 h-3 rounded-full" [class]="role.color"></div>
          <h3 class="font-semibold text-slate-900">{{ role.name }}</h3>
        </div>
        <p class="text-sm text-slate-500 mb-4">{{ role.users }} users assigned</p>
        <div class="space-y-2">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wide">Permissions</p>
          @for (perm of role.permissions; track perm) {
            <div class="flex items-center gap-2 text-sm text-slate-600">
              <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
              {{ moduleLabel(perm) }}
            </div>
          }
        </div>
        <a
          [routerLink]="['/tenant-admin/roles/edit', role.id]"
          class="mt-4 inline-block text-sm text-brand-600 font-medium hover:text-brand-700"
        >
          Edit Permissions
        </a>
      </div>
    }
  </div>
</div>
