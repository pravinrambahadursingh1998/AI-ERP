<app-auth-card
  [title]="step() === 'email' ? 'Forgot Password' : 'Verify OTP'"
  [subtitle]="step() === 'email'
    ? 'Enter your email address and we will send you a one-time password'
    : 'Enter the 6-digit code sent to ' + email()"
  welcomeTitle="RESET"
  welcomeHeadline="SECURE RECOVERY"
  welcomeText="Recover your account securely using email verification. A one-time password will be sent to your registered email address."
  footerText="Remember your password?"
  footerLinkText="Sign In"
  footerLink="/login"
>
  @if (step() === 'email') {
    <form [formGroup]="emailForm" (ngSubmit)="sendOtp()" class="space-y-4">
      <div class="relative">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        <input
          type="email"
          formControlName="email"
          placeholder="Email Address"
          class="w-full pl-11 pr-4 py-3 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0"
        />
      </div>

      @if (emailForm.get('email')?.invalid && emailForm.get('email')?.touched) {
        <p class="text-xs text-red-500">Please enter a valid email address</p>
      }

      <button
        type="submit"
        class="w-full py-3 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 transition-colors text-sm tracking-wide"
      >
        Send OTP
      </button>
    </form>
  } @else {
    <form [formGroup]="otpForm" (ngSubmit)="verifyOtp()" class="space-y-6">
      <div>
        <p class="text-xs text-slate-500 text-center mb-4">Enter verification code</p>
        <app-otp-input formControlName="otp" />
      </div>

      <button
        type="submit"
        class="w-full py-3 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 transition-colors text-sm tracking-wide"
      >
        Verify OTP
      </button>

      <div class="flex items-center justify-between text-xs">
        <button type="button" (click)="backToEmail()" class="text-slate-500 hover:text-slate-700 font-medium">
          ← Change email
        </button>
        <button
          type="button"
          (click)="resendOtp()"
          [disabled]="resendCooldown() > 0"
          class="text-blue-600 font-medium hover:text-blue-700 disabled:text-slate-400 disabled:cursor-not-allowed"
        >
          @if (resendCooldown() > 0) {
            Resend in {{ resendCooldown() }}s
          } @else {
            Resend OTP
          }
        </button>
      </div>
    </form>
  }
</app-auth-card>
