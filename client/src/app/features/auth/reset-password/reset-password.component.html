<app-auth-card
  title="Reset Password"
  [subtitle]="'Create a new password for ' + email()"
  welcomeTitle="NEW"
  welcomeHeadline="PASSWORD SETUP"
  welcomeText="Choose a strong password with at least 8 characters. Your new password will be used to access your AI ERP portal."
  footerText="Back to"
  footerLinkText="Sign In"
  footerLink="/login"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
      <input
        [type]="showPassword() ? 'text' : 'password'"
        formControlName="password"
        placeholder="New Password"
        class="w-full pl-11 pr-16 py-3 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0"
      />
      <button
        type="button"
        (click)="showPassword.set(!showPassword())"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-500 hover:text-blue-600 tracking-wide"
      >
        {{ showPassword() ? 'HIDE' : 'SHOW' }}
      </button>
    </div>

    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
      <input
        [type]="showConfirm() ? 'text' : 'password'"
        formControlName="confirmPassword"
        placeholder="Confirm Password"
        class="w-full pl-11 pr-16 py-3 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0"
      />
      <button
        type="button"
        (click)="showConfirm.set(!showConfirm())"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-500 hover:text-blue-600 tracking-wide"
      >
        {{ showConfirm() ? 'HIDE' : 'SHOW' }}
      </button>
    </div>

    @if (form.hasError('mismatch') && form.get('confirmPassword')?.touched) {
      <p class="text-xs text-red-500">Passwords do not match</p>
    }

    <ul class="text-[10px] text-slate-400 space-y-1 px-1">
      <li>• Minimum 8 characters</li>
      <li>• Use letters, numbers & symbols for strength</li>
    </ul>

    <button
      type="submit"
      class="w-full py-3 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 transition-colors text-sm tracking-wide"
    >
      Reset Password
    </button>
  </form>
</app-auth-card>
