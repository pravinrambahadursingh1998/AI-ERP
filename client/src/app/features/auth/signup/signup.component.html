<app-auth-card
  variant="signup"
  title="Sign Up"
  subtitle="Register your organization for AI-powered ERP services"
  welcomeTitle="JOIN US"
  welcomeHeadline="START YOUR JOURNEY"
  welcomeText="Register your organization and get access to AI-powered ERP tools. Our team will review your request and activate your account."
  footerText="Already have an account?"
  footerLinkText="Sign In"
  footerLink="/login"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-2.5">
    <input type="text" formControlName="companyName" placeholder="Company Name" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
    <select formControlName="industry" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0 text-slate-600">
      <option value="" disabled>Industry Type</option>
      @for (ind of industries; track ind) {
        <option [value]="ind">{{ ind }}</option>
      }
    </select>
    <input type="text" formControlName="contactPerson" placeholder="Contact Person" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
    <input type="email" formControlName="email" placeholder="Email Address" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
    <input type="tel" formControlName="mobile" placeholder="Mobile Number" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
    <div class="grid grid-cols-2 gap-2.5">
      <select formControlName="employeeCount" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0 text-slate-600">
        <option value="" disabled>Employees</option>
        @for (count of employeeCounts; track count) {
          <option [value]="count">{{ count }}</option>
        }
      </select>
      <select formControlName="country" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0 text-slate-600">
        <option value="" disabled>Country</option>
        @for (c of countries; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </div>
    <input type="password" formControlName="password" placeholder="Password (min 8 characters)" class="w-full px-4 py-2 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />

    <label class="flex items-start gap-2 cursor-pointer pt-0.5">
      <input
        type="checkbox"
        formControlName="acceptTerms"
        class="w-4 h-4 mt-0.5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 shrink-0"
      />
      <span class="text-[11px] text-slate-500 leading-snug">
        I agree to the
        <a routerLink="/terms" class="text-blue-600 font-medium hover:text-blue-700">Terms &amp; Conditions</a>
        and
        <a routerLink="/privacy" class="text-blue-600 font-medium hover:text-blue-700">Privacy Policy</a>
      </span>
    </label>
    @if (form.get('acceptTerms')?.invalid && form.get('acceptTerms')?.touched) {
      <p class="text-[11px] text-red-500">You must accept the terms and conditions to continue</p>
    }

    <button type="submit" class="w-full py-2.5 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 transition-colors text-sm tracking-wide mt-1">
      Submit Registration
    </button>
  </form>
</app-auth-card>
