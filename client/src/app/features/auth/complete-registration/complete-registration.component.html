@if (invalidToken()) {
  <app-auth-card
    title="Invalid Link"
    subtitle="This registration link is invalid, expired, or already used"
    welcomeTitle="OOPS"
    welcomeHeadline="LINK EXPIRED"
    welcomeText="Please contact support or wait for a new registration email after your payment and approval are complete."
    footerText="Go to"
    footerLinkText="Sign In"
    footerLink="/login"
  >
    <div class="text-center space-y-4">
      <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto">
        <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <a routerLink="/login" class="inline-block py-3 px-6 bg-navy text-white font-bold rounded-lg text-sm">Back to Login</a>
    </div>
  </app-auth-card>
} @else {
  <app-auth-card
    title="Complete Registration"
    [subtitle]="'Finish setting up ' + (onboardingData()?.companyName ?? 'your organization')"
    welcomeTitle="ALMOST"
    welcomeHeadline="THERE!"
    welcomeText="Complete your organization profile and create your tenant admin account to start using AI ERP Platform."
    footerText="Need help?"
    footerLinkText="Contact Support"
    footerLink="/"
  >
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-3 max-h-[480px] overflow-y-auto pr-1">
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Company Details</p>

      <input type="text" formControlName="companyName" placeholder="Company Name" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
      <select formControlName="industry" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0 text-slate-600">
        <option value="" disabled>Industry</option>
        @for (ind of industries; track ind) {
          <option [value]="ind">{{ ind }}</option>
        }
      </select>
      <input type="text" formControlName="address" placeholder="Street Address" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
      <div class="grid grid-cols-2 gap-3">
        <input type="text" formControlName="city" placeholder="City" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
        <input type="text" formControlName="state" placeholder="State" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <input type="text" formControlName="zipCode" placeholder="ZIP Code" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
        <select formControlName="country" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0 text-slate-600">
          <option value="" disabled>Country</option>
          @for (c of countries; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </div>
      <input type="url" formControlName="website" placeholder="Website (optional)" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
      <input type="text" formControlName="taxId" placeholder="Tax ID / Registration Number" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />

      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide pt-2">Admin Account</p>

      <input type="text" formControlName="contactPerson" placeholder="Admin Full Name" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />
      <input type="email" formControlName="email" placeholder="Admin Email" class="w-full px-4 py-2.5 bg-slate-200 rounded-lg text-sm border-0 text-slate-500 cursor-not-allowed" />
      <input type="tel" formControlName="mobile" placeholder="Mobile Number" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />

      <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="adminPassword"
          placeholder="Admin Password (min 8 chars)"
          class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0 pr-16"
        />
        <button type="button" (click)="showPassword.set(!showPassword())" class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-500">SHOW</button>
      </div>
      <input type="password" formControlName="confirmPassword" placeholder="Confirm Password" class="w-full px-4 py-2.5 bg-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/30 border-0" />

      @if (form.hasError('mismatch') && form.get('confirmPassword')?.touched) {
        <p class="text-xs text-red-500">Passwords do not match</p>
      }

      <label class="flex items-start gap-2 cursor-pointer pt-1">
        <input type="checkbox" formControlName="acceptTerms" class="w-4 h-4 mt-0.5 rounded text-blue-600" />
        <span class="text-xs text-slate-500">I agree to the Terms & Conditions and Privacy Policy</span>
      </label>

      <button type="submit" class="w-full py-3 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 transition-colors text-sm tracking-wide sticky bottom-0">
        Complete Registration
      </button>
    </form>
  </app-auth-card>
}
