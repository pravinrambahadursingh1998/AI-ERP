<div class="max-w-lg mx-auto text-center">
  <div class="card bg-white rounded-2xl border border-slate-200 p-8 sm:p-10">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-slate-900 mb-2">Payment Failed</h1>
    <p class="text-slate-500 text-sm mb-6">{{ reason() }}</p>

    <div class="flex flex-col sm:flex-row gap-3">
      <a
        routerLink="/payment/checkout"
        class="flex-1 py-3 bg-navy text-white font-bold rounded-lg hover:bg-slate-800 text-sm flex items-center justify-center"
      >
        Try Again
      </a>
      <a
        routerLink="/payment/choose-plan"
        class="flex-1 py-3 border-2 border-slate-300 text-slate-700 font-bold rounded-lg hover:bg-slate-50 text-sm flex items-center justify-center"
      >
        Change Plan
      </a>
    </div>

    <a routerLink="/" class="inline-block mt-4 text-sm text-slate-500 hover:text-slate-700">Back to Home</a>
  </div>
</div>
