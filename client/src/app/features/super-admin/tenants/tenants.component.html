<div>
  <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Tenants</h1>
      <p class="text-slate-500 text-sm mt-1">Manage all registered organizations</p>
    </div>
    <input type="search" placeholder="Search tenants..." class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-brand-500/30" />
  </div>

  <div class="row grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    @for (tenant of tenants(); track tenant.id) {
      <div class="card bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex items-start justify-between mb-3">
          <div class="w-10 h-10 rounded-lg bg-brand-100 flex items-center justify-center text-brand-700 font-bold text-sm">
            {{ tenant.companyName.charAt(0) }}
          </div>
          <span
            class="text-xs px-2 py-1 rounded-full font-medium"
            [class]="{
              'bg-emerald-100 text-emerald-700': tenant.status === 'active',
              'bg-red-100 text-red-700': tenant.status === 'suspended',
              'bg-amber-100 text-amber-700': tenant.status === 'pending'
            }"
          >{{ tenant.status }}</span>
        </div>
        <h3 class="font-semibold text-slate-900">{{ tenant.companyName }}</h3>
        <p class="text-xs text-slate-400 mb-3">{{ tenant.industry }}</p>
        <div class="flex items-center justify-between text-sm text-slate-500 border-t border-slate-100 pt-3">
          <span>{{ tenant.plan }} Plan</span>
          <span>{{ tenant.users }} users</span>
        </div>
      </div>
    }
  </div>
</div>
