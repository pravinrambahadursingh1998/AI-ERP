<div class="min-h-screen bg-slate-50 flex flex-col">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3 sm:gap-4">
      <a routerLink="/" class="flex items-center gap-2 shrink-0">
        <div class="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="font-bold text-slate-900 text-sm sm:text-base">AI ERP</span>
      </a>

      @if (!currentPath().includes('billing-history')) {
        <div class="flex-1 flex items-center justify-center min-w-0 px-1 sm:px-4">
          <div class="flex items-center w-full max-w-[220px] sm:max-w-xs md:max-w-md">
            @for (step of steps; track step.path; let i = $index; let last = $last) {
              <div class="flex items-center" [class.flex-1]="!last">
                <div class="flex items-center gap-1.5 shrink-0">
                  <div
                    class="w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold border-2 transition-colors"
                    [ngClass]="isActive(i) ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-300 text-slate-400'"
                  >
                    @if (isActive(i) && i < stepIndex()) {
                      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                      </svg>
                    } @else {
                      {{ i + 1 }}
                    }
                  </div>
                  <span
                    class="text-[10px] font-medium whitespace-nowrap hidden md:inline"
                    [class]="isActive(i) ? 'text-blue-600' : 'text-slate-400'"
                  >
                    {{ step.label }}
                  </span>
                </div>
                @if (!last) {
                  <div class="flex-1 h-px mx-1.5 sm:mx-2" [class]="isActive(i + 1) ? 'bg-blue-600' : 'bg-slate-200'"></div>
                }
              </div>
            }
          </div>
        </div>
      } @else {
        <div class="flex-1"></div>
      }

      <a
        routerLink="/payment/billing-history"
        class="text-xs sm:text-sm text-blue-600 font-medium hover:text-blue-700 shrink-0 whitespace-nowrap"
      >
        <span class="hidden sm:inline">Billing History</span>
        <span class="sm:hidden">Billing</span>
      </a>
    </div>
  </header>

  <main class="flex-1 py-6 px-4 sm:px-6">
    <router-outlet />
  </main>
</div>
