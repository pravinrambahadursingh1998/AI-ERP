<div class="min-h-screen flex flex-col">
  <header class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a routerLink="/" class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-lg bg-brand-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <span class="font-bold text-lg text-slate-900">AI ERP</span>
        </a>

        <nav class="hidden md:flex items-center gap-8">
          <a routerLink="/" routerLinkActive="text-brand-600" [routerLinkActiveOptions]="{ exact: true }" class="text-sm font-medium text-slate-600 hover:text-brand-600 transition-colors">Home</a>
          <a routerLink="/pricing" routerLinkActive="text-brand-600" class="text-sm font-medium text-slate-600 hover:text-brand-600 transition-colors">Pricing</a>
        </nav>

        <div class="flex items-center gap-3">
          <a routerLink="/login" class="text-sm font-medium text-slate-600 hover:text-brand-600 transition-colors hidden sm:block">Login</a>
          <a routerLink="/signup" class="px-4 py-2 bg-brand-600 text-white text-sm font-semibold rounded-lg hover:bg-brand-700 transition-colors">Sign Up</a>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-1">
    <router-outlet />
  </main>

  <footer class="bg-navy text-white py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
        <div class="md:col-span-2">
          <div class="flex items-center gap-2 mb-4">
            <div class="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
            </div>
            <span class="font-bold">AI ERP Platform</span>
          </div>
          <p class="text-white/60 text-sm max-w-md">Multi-tenant AI-powered ERP solution for modern organizations. Streamline operations with intelligent automation.</p>
        </div>
        <div>
          <h4 class="font-semibold mb-3 text-sm">Product</h4>
          <ul class="space-y-2 text-sm text-white/60">
            <li><a routerLink="/pricing" class="hover:text-white transition-colors">Pricing</a></li>
            <li><a routerLink="/payment/choose-plan" class="hover:text-white transition-colors">Subscribe</a></li>
            <li><a routerLink="/signup" class="hover:text-white transition-colors">Get Started</a></li>
          </ul>
        </div>
        <div>
          <h4 class="font-semibold mb-3 text-sm">Account</h4>
          <ul class="space-y-2 text-sm text-white/60">
            <li><a routerLink="/login" class="hover:text-white transition-colors">Login</a></li>
            <li><a routerLink="/signup" class="hover:text-white transition-colors">Sign Up</a></li>
          </ul>
        </div>
      </div>
      <div class="border-t border-white/10 mt-8 pt-8 text-center text-sm text-white/40">
        &copy; 2026 AI ERP Platform. All rights reserved.
      </div>
    </div>
  </footer>
</div>
