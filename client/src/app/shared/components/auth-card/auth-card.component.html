<div class="min-h-screen auth-bg-pattern flex items-center justify-center p-4 sm:p-6 py-8 relative">
  <!-- Crown logo -->
  <div class="absolute top-6 left-6 w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center shadow-lg">
    <svg class="w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 24 24">
      <path d="M5 16L3 5l5.5 3L12 4l3.5 4L21 5l-2 11H5zm2.7-2h8.6l.9-5.4-2.1 1.2L12 7.5 8.9 9.8 7.6 8.6l.9 5.4zM12 18c-1.1 0-2 .9-2 2h4c0-1.1-.9-2-2-2z" />
    </svg>
  </div>

  <div
    class="w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row"
    [ngClass]="variant === 'signup' ? 'max-w-5xl' : 'max-w-4xl min-h-[560px]'"
  >
    <!-- Left panel -->
    <div class="hidden md:flex md:w-[38%] relative bg-gradient-to-br from-blue-500 via-blue-600 to-blue-800 p-10 flex-col justify-center overflow-hidden shrink-0">
      <div class="absolute -top-16 -left-16 w-48 h-48 rounded-full bg-white/10"></div>
      <div class="absolute top-1/3 -right-10 w-36 h-36 rounded-full bg-white/10"></div>
      <div class="absolute -bottom-10 left-1/4 w-56 h-56 rounded-full bg-blue-400/30"></div>
      <div class="absolute bottom-10 right-10 w-20 h-20 rounded-full bg-white/15"></div>

      <div class="relative z-10">
        <h2 class="text-3xl font-extrabold text-white tracking-wider mb-2">{{ welcomeTitle }}</h2>
        <h3 class="text-sm font-bold text-white/90 tracking-widest mb-6 uppercase">{{ welcomeHeadline }}</h3>
        <p class="text-white/70 text-sm leading-relaxed">{{ welcomeText }}</p>
      </div>
    </div>

    <!-- Right panel -->
    <div
      class="flex-1 flex flex-col justify-center relative"
      [ngClass]="variant === 'signup' ? 'px-8 py-8 sm:px-10 sm:py-10' : 'p-8 sm:p-10'"
    >
      <div class="absolute -bottom-6 -right-6 w-24 h-24 rounded-full bg-blue-500/20 hidden sm:block"></div>

      <div
        class="relative z-10 mx-auto w-full"
        [ngClass]="variant === 'signup' ? 'max-w-lg' : 'max-w-sm'"
      >
        <h1 class="text-2xl font-bold text-slate-900 mb-1">{{ title }}</h1>
        <p class="text-slate-400 text-xs" [class.mb-8]="variant === 'default'" [class.mb-5]="variant === 'signup'">{{ subtitle }}</p>

        <ng-content />

        <p class="text-center text-sm text-slate-500 mt-5">
          {{ footerText }}
          <a [routerLink]="footerLink" class="text-blue-600 font-semibold hover:text-blue-700 ml-1">{{ footerLinkText }}</a>
        </p>
      </div>
    </div>
  </div>
</div>
