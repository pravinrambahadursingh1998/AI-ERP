<div class="card bg-white rounded-xl border border-slate-200 flex flex-col h-[calc(100vh-10rem)] min-h-[500px]">
  <!-- Chat header -->
  <div class="px-6 py-4 border-b border-slate-200 flex items-center gap-3">
    <div class="w-10 h-10 rounded-full bg-brand-100 flex items-center justify-center">
      <svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>
    <div>
      <h3 class="font-semibold text-slate-900">AI Assistant</h3>
      <p class="text-xs text-emerald-500 flex items-center gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Online
      </p>
    </div>
  </div>

  <!-- Messages -->
  <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4">
    @for (msg of messages(); track $index) {
      <div [class]="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
        <div
          class="max-w-[85%] sm:max-w-[70%] rounded-2xl px-4 py-3 text-sm whitespace-pre-line"
          [class]="msg.role === 'user' ? 'bg-brand-600 text-white rounded-br-md' : 'bg-slate-100 text-slate-700 rounded-bl-md'"
        >
          {{ msg.content }}
          <p class="text-[10px] mt-1 opacity-60">{{ msg.time }}</p>
        </div>
      </div>
    }
  </div>

  <!-- Suggestions -->
  <div class="px-4 sm:px-6 pb-2 flex flex-wrap gap-2">
    @for (s of suggestions; track s) {
      <button
        (click)="sendMessage(s)"
        class="px-3 py-1.5 text-xs bg-slate-100 text-slate-600 rounded-full hover:bg-brand-50 hover:text-brand-600 transition-colors"
      >
        {{ s }}
      </button>
    }
  </div>

  <!-- Input -->
  <div class="p-4 sm:p-6 border-t border-slate-200">
    <div class="flex gap-2">
      <input
        [(ngModel)]="input"
        (keydown.enter)="sendMessage()"
        placeholder="Ask me anything about your ERP data..."
        class="flex-1 px-4 py-3 bg-slate-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 border-0"
      />
      <button
        (click)="sendMessage()"
        class="px-5 py-3 bg-brand-600 text-white rounded-xl hover:bg-brand-700 transition-colors shrink-0"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </div>
  </div>
</div>
